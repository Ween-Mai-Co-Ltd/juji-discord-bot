services:
  juji-discord-bot:
    build: .
    restart: unless-stopped
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      - YTDLP_COOKIES_FILE=/usr/src/app/secrets/cookies.txt
    volumes:
      - music_cache:/usr/src/app/music_cache
      - ./secrets:/usr/src/app/secrets:ro

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_CONTEXT_LENGTH=4096
    volumes:
      - ollama_models:/root/.ollama

volumes:
  music_cache:
  ollama_models:
